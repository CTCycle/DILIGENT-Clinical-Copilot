<div class="app-top-nav">
  <header class="app-header">
    <div class="app-header-content">
      <div class="app-header-brand">
        <span class="app-header-logo">
          <img src="/diligent-logo.png" alt="Diligent logo" />
        </span>
        <span class="app-header-wordmark">DILIGENT Clinical Copilot</span>
      </div>
      <nav class="tab-bar" aria-label="Main navigation">
        <div class="tab-items" role="tablist" aria-label="Main navigation tabs">
          @for (item of navItems; track item.pageId) {
            <button
              type="button"
              class="tab-item"
              [class.active]="stateService.state().activePage === item.pageId"
              role="tab"
              [attr.aria-selected]="stateService.state().activePage === item.pageId"
              [attr.tabindex]="stateService.state().activePage === item.pageId ? '0' : '-1'"
              (click)="onNavigate(item.pageId)"
              (keydown)="onNavTabKeydown($event, item.pageId)"
              [attr.aria-current]="stateService.state().activePage === item.pageId ? 'page' : null"
              [title]="item.label"
            >
              <span class="tab-label">{{ item.label }}</span>
            </button>
          }
        </div>
      </nav>
      <div class="app-header-actions">
        <button
          type="button"
          class="app-header-icon-btn"
          (click)="toggleTheme()"
          [attr.aria-label]="themeAriaLabel"
          [attr.title]="themeAriaLabel"
        >
          @if (isDarkTheme) {
            <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 17a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1ZM3 11a1 1 0 1 1 0 2H1a1 1 0 1 1 0-2h2Zm20 0a1 1 0 1 1 0 2h-2a1 1 0 1 1 0-2h2ZM5.64 4.22a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 0 1-1.42 1.41L5.64 5.64a1 1 0 0 1 0-1.42Zm12.73 12.73a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 0 1-1.42 1.41l-1.41-1.41a1 1 0 0 1 0-1.42ZM4.22 18.36a1 1 0 0 1 0-1.41l1.42-1.42a1 1 0 0 1 1.41 1.42l-1.41 1.41a1 1 0 0 1-1.42 0Zm12.73-12.73a1 1 0 0 1 0-1.41l1.42-1.42a1 1 0 0 1 1.41 1.42l-1.41 1.41a1 1 0 0 1-1.42 0Z"/>
            </svg>
          } @else {
            <img class="theme-icon theme-icon-image" src="/dark-mode-icon.png" alt="" aria-hidden="true" />
          }
        </button>
      </div>
    </div>
  </header>
</div>
