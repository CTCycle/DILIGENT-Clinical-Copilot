name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install backend
        working-directory: app/server
        run: python -m pip install -e ".[test]"
      - name: Compile backend
        working-directory: app/server
        run: python -m compileall .
      - name: Lint backend
        working-directory: app/server
        run: ruff check .
      - name: Type check backend
        working-directory: app/server
        run: pyright .
      - name: Test backend
        working-directory: app/server
        run: pytest ../tests
      - name: Validate OpenAPI generation
        working-directory: app/server
        run: python -c "from app import app; app.openapi()"

  modelconfig-regression-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend test dependencies
        working-directory: app/server
        run: python -m pip install -e ".[test]"

      - name: Install frontend dependencies
        working-directory: app/client
        run: npm ci

      - name: Install Playwright browser
        working-directory: app/server
        run: python -m playwright install chromium

      - name: Run model-config unit test
        working-directory: app/server
        run: pytest ../tests/unit/test_model_config_persistence.py -q --junitxml ../tests/.ci-modelconfig-unit-junit.xml

      - name: Start backend and frontend
        shell: pwsh
        run: |
          Start-Process -FilePath "python" -ArgumentList "-m","uvicorn","app:app","--host","127.0.0.1","--port","7690" -WorkingDirectory "app/server" -RedirectStandardOutput "app/server/.ci-modelconfig-backend.out.log" -RedirectStandardError "app/server/.ci-modelconfig-backend.err.log" -WindowStyle Hidden
          Start-Process -FilePath "npm.cmd" -ArgumentList "run","start" -WorkingDirectory "app/client" -RedirectStandardOutput "app/client/.ci-modelconfig-frontend.out.log" -RedirectStandardError "app/client/.ci-modelconfig-frontend.err.log" -WindowStyle Hidden
          $deadline = (Get-Date).AddMinutes(3)
          $ready = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $backend = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:7690/api/health" -TimeoutSec 3
              $frontend = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:9847/" -TimeoutSec 3
              if ($backend.StatusCode -eq 200 -and $frontend.StatusCode -lt 500) {
                $ready = $true
                break
              }
            } catch {}
            Start-Sleep -Milliseconds 500
          }
          if (-not $ready) {
            Write-Error "Backend/frontend readiness check timed out."
            exit 1
          }

      - name: Upload startup logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modelconfig-regression-startup-logs
          if-no-files-found: ignore
          path: |
            app/server/.ci-modelconfig-backend.out.log
            app/server/.ci-modelconfig-backend.err.log
            app/client/.ci-modelconfig-frontend.out.log
            app/client/.ci-modelconfig-frontend.err.log

      - name: Run model-config API and app-flow e2e
        shell: pwsh
        run: |
          $env:APP_TEST_FRONTEND_URL = "http://127.0.0.1:9847"
          $env:APP_TEST_BACKEND_URL = "http://127.0.0.1:7690"
          pytest app/tests/e2e/test_model_config_api.py app/tests/e2e/test_app_flow.py -k "runtime_toggle_enables_save_and_submits_put or model_config or dili_run_burst_click_submits_single_job or dili_run_conflict_surfaces_clear_error_message" -q --junitxml app/tests/.ci-modelconfig-e2e-junit.xml

      - name: Upload pytest reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modelconfig-regression-pytest-reports
          if-no-files-found: ignore
          path: |
            app/tests/.ci-modelconfig-unit-junit.xml
            app/tests/.ci-modelconfig-e2e-junit.xml

      - name: Cleanup listeners
        if: always()
        shell: pwsh
        run: |
          $ports=7690,9847
          $conns=Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue | Where-Object { $_.LocalPort -in $ports }
          $ids=@($conns | Select-Object -ExpandProperty OwningProcess -Unique)
          foreach($id in $ids){ Stop-Process -Id $id -Force -ErrorAction SilentlyContinue }
