name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Sanity
        run: python -c "print('CI sanity check passed')"
