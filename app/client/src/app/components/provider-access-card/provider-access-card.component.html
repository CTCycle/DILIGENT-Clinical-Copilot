<div [class]="className">
  @if (isCompact) {
    <button
      class="model-config-provider-button"
      type="button"
      (click)="manageKeys.emit()"
      [disabled]="disabled"
    >
      <span>{{ label }}</span>
      <span class="model-config-provider-hint">{{ hint }}</span>
    </button>
  } @else {
    <button
      class="model-config-provider-button"
      type="button"
      (click)="select.emit()"
      [disabled]="disabled"
    >
      <span>{{ label }}</span>
    </button>
  }
  <button
    class="model-config-provider-key"
    type="button"
    (click)="manageKeys.emit()"
    [disabled]="disabled"
    [attr.aria-label]="manageKeyAriaLabel"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M7.75 13.75a3.5 3.5 0 1 1 3.12-5.08l.16.31h7.22a1 1 0 0 1 .7.3l1.8 1.82-2.12 2.12-1.25-1.25-1.45 1.45-1.23-1.23-3.67.01-.16.31a3.49 3.49 0 0 1-3.12 1.94Zm0-2.25a1.25 1.25 0 1 0 0-2.5 1.25 1.25 0 0 0 0 2.5Z" />
    </svg>
  </button>
</div>
