services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - DILIGENT/settings/.env
    environment:
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 8000
      DILIGENT_CLOUD_MODE: "${DILIGENT_CLOUD_MODE:-true}"
    ports:
      - "127.0.0.1:${FASTAPI_PORT:-8000}:8000"
    volumes:
      - diligent_resources:/app/DILIGENT/resources
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/model-config', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${UI_PORT:-7861}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  diligent_resources:
